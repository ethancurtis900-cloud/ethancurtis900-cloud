<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="1024" height="1024" fill="white"/>

  <!-- Teal Gradient Background (rounded square) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Centered rounded square with logo -->
  <rect x="162" y="162" width="700" height="700" rx="140" fill="url(#bgGradient)"/>

  <!-- M Logo -->
  <path d="M 362 562 L 362 462 L 412 512 L 512 412 L 612 512 L 662 462 L 662 562"
        stroke="white"
        stroke-width="45"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Dots on the M peaks -->
  <circle cx="412" cy="512" r="22" fill="white"/>
  <circle cx="512" cy="412" r="22" fill="white"/>
  <circle cx="612" cy="512" r="22" fill="white"/>
</svg>
